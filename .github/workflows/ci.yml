name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # caregiver-mobile is excluded: its build script starts Metro bundler and
        # requires Replit-specific runtime env vars (REPLIT_DEV_DOMAIN / REPLIT_INTERNAL_APP_DOMAIN).
        # It is a deployment-time build, not a compile check.
        # PORT and BASE_PATH are required by the Vite configs even during `vite build`.
        run: pnpm -r --filter "!@workspace/caregiver-mobile" --if-present run build
        env:
          PORT: "3000"
          BASE_PATH: "/"
          NODE_ENV: production
