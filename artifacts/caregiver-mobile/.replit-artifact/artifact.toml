kind = "mobile"
  previewPath = "/mobile/"
  title = "Agentryx Mobile"
  version = "1.0.0"
  id = "artifacts/caregiver-mobile"
  router = "expo-domain"

  [[integratedSkills]]
  name = "expo"
  version = "1.0.0"

  [[services]]
  name = "expo"
  paths = [ "/mobile/" ]
  localPort = 8082
  ensurePreviewReachable = "/status"

  [services.development]
  run = "pnpm --filter @workspace/caregiver-mobile run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/caregiver-mobile", "run", "build" ]
  run = [ "pnpm", "--filter", "@workspace/caregiver-mobile", "run", "serve" ]

  [services.env]
  PORT = "8082"
  BASE_PATH = "/mobile/"
